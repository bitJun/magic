<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量标注 - 人脸弹窗</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: transparent;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: rgba(15, 15, 25, 0.98);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.08);
    }

    .modal-card .m-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-card .m-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-heading);
    }

    .modal-card .m-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-small);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .modal-card .m-close:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-heading);
    }

    .modal-card .m-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border-normal);
    }

    /* Batch progress */
    .batch-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(15, 15, 25, 0.5);
      border-radius: var(--radius-small);
      border: 1px solid var(--border-normal);
    }

    .batch-progress .bp-label {
      font-size: 13px;
      color: var(--text-heading);
      font-weight: 600;
    }

    .batch-progress .bp-count {
      font-size: 12px;
      color: var(--text-tag);
      font-weight: 600;
    }

    .batch-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .batch-bar .batch-fill {
      height: 100%;
      background: var(--gradient-primary);
      border-radius: 2px;
    }

    .batch-current {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding: 14px;
      background: rgba(15, 15, 25, 0.4);
      border-radius: var(--radius-small);
      border: 1px solid var(--border-normal);
    }

    .batch-current .bc-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gradient-secondary);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .batch-current .bc-avatar svg {
      width: 24px;
      height: 24px;
      color: #fff;
      opacity: 0.5;
    }

    .batch-current .bc-fields {
      flex: 1;
    }

    /* Radio group */
    .radio-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-small);
      background: rgba(15, 15, 25, 0.6);
      border: 1px solid var(--border-normal);
      font-size: 13px;
      color: var(--text-body);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .radio-item:hover {
      border-color: var(--border-accent);
    }

    .radio-item.active {
      border-color: var(--purple);
      background: rgba(139, 92, 246, 0.1);
      color: var(--text-active);
    }

    .r-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .radio-item.active .r-dot {
      border-color: var(--purple);
    }

    .r-fill {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
      opacity: 0;
    }

    .radio-item.active .r-fill {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="modal-card">
    <div class="m-header">
      <h2 class="m-title">批量标注</h2>
      <button class="m-close" onclick="window.parent.postMessage('closeModal', '*')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="batch-progress">
      <span class="bp-label">标注进度</span>
      <span class="bp-count">1 / 28</span>
    </div>
    <div class="batch-bar" style="margin-bottom:20px;"><div class="batch-fill" style="width: 3.5%;"></div></div>

    <div class="batch-current">
      <div class="bc-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="bc-fields" style="display:flex;flex-direction:column;gap:8px;">
        <input type="text" class="form-input" placeholder="输入人物姓名" style="padding:7px 12px;font-size:13px;">
        <div class="radio-group">
          <label class="radio-item active" style="padding:5px 12px;font-size:12px;">
            <span class="r-dot" style="width:12px;height:12px;"><span class="r-fill" style="width:5px;height:5px;"></span></span>
            模特
          </label>
          <label class="radio-item" style="padding:5px 12px;font-size:12px;">
            <span class="r-dot" style="width:12px;height:12px;"><span class="r-fill" style="width:5px;height:5px;"></span></span>
            演员
          </label>
          <label class="radio-item" style="padding:5px 12px;font-size:12px;">
            <span class="r-dot" style="width:12px;height:12px;"><span class="r-fill" style="width:5px;height:5px;"></span></span>
            工作人员
          </label>
        </div>
      </div>
    </div>

    <div class="m-footer">
      <button class="btn-secondary" onclick="window.parent.postMessage('closeModal', '*')">跳过</button>
      <button class="btn-primary" onclick="window.parent.postMessage('closeModal', '*')">确认并下一个</button>
    </div>
  </div>

</body>
</html>
