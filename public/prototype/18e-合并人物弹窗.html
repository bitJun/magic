<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合并人物 - 人脸弹窗</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: transparent;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: rgba(15, 15, 25, 0.98);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.08);
    }

    .modal-card .m-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-card .m-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-heading);
    }

    .modal-card .m-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-small);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .modal-card .m-close:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-heading);
    }

    .modal-card .m-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border-normal);
    }

    /* Merge modal - Phase 2 */
    .phase2-border {
      border-style: dashed;
      border-color: rgba(251, 191, 36, 0.3);
      position: relative;
    }

    .phase2-tag {
      position: absolute;
      top: -10px;
      right: 20px;
      padding: 2px 10px;
      border-radius: 4px;
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(251, 191, 36, 0.25);
    }

    .merge-card {
      padding: 14px;
      background: rgba(15, 15, 25, 0.5);
      border: 1px solid var(--border-normal);
      border-radius: var(--radius-small);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .merge-card .mc-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .merge-card .mc-info {
      flex: 1;
    }

    .merge-card .mc-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-heading);
    }

    .merge-card .mc-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .merge-card .mc-check {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .merge-card .mc-check.checked {
      background: var(--gradient-primary);
      border-color: transparent;
    }

    .merge-card .mc-check svg {
      width: 10px;
      height: 10px;
      display: none;
    }

    .merge-card .mc-check.checked svg {
      display: block;
    }

    .merge-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .merge-arrow {
      text-align: center;
      color: var(--text-dim);
      margin: 8px 0;
      font-size: 18px;
    }

    .result-preview {
      padding: 14px;
      background: rgba(139, 92, 246, 0.06);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-small);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-preview .rp-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .result-preview .rp-info .rp-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-heading);
    }

    .result-preview .rp-info .rp-meta {
      font-size: 12px;
      color: var(--text-tag);
    }
  </style>
</head>
<body>

  <div class="modal-card phase2-border">
    <span class="phase2-tag">二期</span>
    <div class="m-header">
      <h2 class="m-title">合并人物</h2>
      <button class="m-close" onclick="window.parent.postMessage('closeModal', '*')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="merge-label">主要人物</div>
    <div class="merge-card" style="border-color: var(--border-accent);">
      <div class="mc-avatar">李</div>
      <div class="mc-info">
        <div class="mc-name">李小美</div>
        <div class="mc-meta">模特 · 45个分镜 · 12个素材</div>
      </div>
    </div>

    <div class="merge-label" style="margin-top:16px;">选择要合并的人物</div>
    <div class="merge-card">
      <div class="mc-avatar" style="background:var(--gradient-secondary);">李</div>
      <div class="mc-info">
        <div class="mc-name">小美（未标注）</div>
        <div class="mc-meta">未分类 · 8个分镜 · 3个素材</div>
      </div>
      <span class="mc-check checked">
        <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg>
      </span>
    </div>
    <div class="merge-card">
      <div class="mc-avatar" style="background:linear-gradient(135deg,#f59e0b,#ef4444);">?</div>
      <div class="mc-info">
        <div class="mc-name">未识别人脸 #23</div>
        <div class="mc-meta">未分类 · 3个分镜 · 1个素材</div>
      </div>
      <span class="mc-check">
        <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg>
      </span>
    </div>

    <div class="merge-arrow">↓</div>

    <div class="merge-label">合并结果预览</div>
    <div class="result-preview">
      <div class="rp-avatar">李</div>
      <div class="rp-info">
        <div class="rp-name">李小美</div>
        <div class="rp-meta">模特 · 53个分镜 · 15个素材（合并后）</div>
      </div>
    </div>

    <div class="m-footer">
      <button class="btn-secondary" onclick="window.parent.postMessage('closeModal', '*')">取消</button>
      <button class="btn-primary" onclick="window.parent.postMessage('closeModal', '*')">确认合并</button>
    </div>
  </div>

</body>
</html>
