<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人脸标注 - 人脸弹窗</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: transparent;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: rgba(15, 15, 25, 0.98);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.08);
    }

    .modal-card .m-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-card .m-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-heading);
    }

    .modal-card .m-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-small);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .modal-card .m-close:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-heading);
    }

    .modal-card .m-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border-normal);
    }

    /* Face thumbnails for annotation */
    .face-thumbs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .face-thumb {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-small);
      background: var(--gradient-secondary);
      border: 2px solid var(--border-normal);
      cursor: pointer;
      transition: all var(--transition-fast);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .face-thumb.active {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    .face-thumb svg {
      width: 28px;
      height: 28px;
      color: #fff;
      opacity: 0.4;
    }

    .face-thumb .face-num {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* Match info */
    .match-info {
      text-align: center;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(139, 92, 246, 0.06);
      border-radius: var(--radius-small);
      border: 1px solid var(--border-normal);
    }

    .match-info .match-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-heading);
    }

    .match-info .match-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Radio group */
    .radio-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-small);
      background: rgba(15, 15, 25, 0.6);
      border: 1px solid var(--border-normal);
      font-size: 13px;
      color: var(--text-body);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .radio-item:hover {
      border-color: var(--border-accent);
    }

    .radio-item.active {
      border-color: var(--purple);
      background: rgba(139, 92, 246, 0.1);
      color: var(--text-active);
    }

    .r-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .radio-item.active .r-dot {
      border-color: var(--purple);
    }

    .r-fill {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
      opacity: 0;
    }

    .radio-item.active .r-fill {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="modal-card">
    <div class="m-header">
      <h2 class="m-title">人脸标注</h2>
      <button class="m-close" onclick="window.parent.postMessage('closeModal', '*')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Face thumbnails -->
    <div class="face-thumbs">
      <div class="face-thumb active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="face-num">1</span>
      </div>
      <div class="face-thumb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="face-num">2</span>
      </div>
      <div class="face-thumb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="face-num">3</span>
      </div>
    </div>

    <div class="match-info">
      <div class="match-val">匹配结果：出现在 45 个分镜中</div>
      <div class="match-desc">系统自动识别到相似人脸</div>
    </div>

    <div class="form-group">
      <label class="form-label">匹配人物（相似度）</label>
      <select class="form-select">
        <option>李小美 · 相似度 96.5%</option>
        <option>王小花 · 相似度 82.1%</option>
        <option>新建人物…</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">人物姓名</label>
      <input type="text" class="form-input" value="李小美">
    </div>

    <div class="form-group">
      <label class="form-label">分类</label>
      <div class="radio-group">
        <label class="radio-item active">
          <span class="r-dot"><span class="r-fill"></span></span>
          模特
        </label>
        <label class="radio-item">
          <span class="r-dot"><span class="r-fill"></span></span>
          演员
        </label>
        <label class="radio-item">
          <span class="r-dot"><span class="r-fill"></span></span>
          工作人员
        </label>
      </div>
    </div>

    <div class="m-footer">
      <button class="btn-secondary" onclick="window.parent.postMessage('closeModal', '*')">跳过</button>
      <button class="btn-primary" onclick="window.parent.postMessage('closeModal', '*')">确认标注</button>
    </div>
  </div>

</body>
</html>
