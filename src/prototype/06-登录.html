<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 智能素材管理系统</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Login Page Specific ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-body);
      position: relative;
      overflow: hidden;
    }

    /* Ambient background orbs */
    .login-page::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      top: -200px; right: -150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .login-page::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      bottom: -180px; left: -100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid pattern overlay */
    .login-bg-pattern {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 24px;
    }

    /* Logo area */
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      border-radius: 22px;
      background: var(--gradient-primary);
      font-size: 32px;
      color: #fff;
      margin-bottom: 18px;
      box-shadow: 0 12px 40px rgba(139, 92, 246, 0.35);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .login-logo-name {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-heading);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .login-logo-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Glassmorphism card */
    .login-card {
      background: rgba(15, 15, 28, 0.75);
      border: 1px solid rgba(139, 92, 246, 0.12);
      border-radius: 20px;
      padding: 36px 32px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(139, 92, 246, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .login-card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-heading);
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    /* Form groups */
    .login-form-group {
      margin-bottom: 20px;
    }
    .login-form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-body-alt);
      margin-bottom: 8px;
    }
    .login-input-wrapper {
      position: relative;
    }
    .login-input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .login-input-wrapper .form-input {
      padding-left: 42px;
      height: 44px;
      font-size: 14px;
      border-radius: var(--radius-button);
      background: rgba(10, 10, 18, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all var(--transition-fast);
    }
    .login-input-wrapper .form-input:focus {
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
      background: rgba(10, 10, 18, 0.8);
    }

    /* Remember / Forgot row */
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .login-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-body-alt);
    }
    .login-checkbox input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      background: rgba(10,10,18,0.5);
      cursor: pointer;
      position: relative;
      transition: all var(--transition-fast);
    }
    .login-checkbox input[type="checkbox"]:checked {
      background: var(--gradient-primary);
      border-color: transparent;
    }
    .login-checkbox input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 11px;
      color: #fff;
      font-weight: 700;
    }
    .login-forgot {
      font-size: 13px;
      color: var(--text-tag);
      transition: color var(--transition-fast);
    }
    .login-forgot:hover {
      color: #c4b5fd;
      text-decoration: underline;
    }

    /* Login button */
    .login-btn {
      width: 100%;
      height: 46px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: var(--radius-button);
    }

    /* Divider */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-normal);
    }
    .login-divider span {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
    }
    .login-footer-hint {
      font-size: 12px;
      color: var(--text-dim-alt);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .login-footer-hint a {
      color: var(--text-tag);
    }
    .login-footer-hint a:hover {
      color: #c4b5fd;
    }
    .login-copyright {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <!-- Decorative particles -->
  <div class="particle" style="top:15%;left:8%;width:4px;height:4px;"></div>
  <div class="particle" style="top:30%;right:12%;width:3px;height:3px;"></div>
  <div class="particle" style="top:70%;left:20%;width:5px;height:5px;"></div>
  <div class="particle" style="top:85%;right:25%;width:3px;height:3px;"></div>
  <div class="particle" style="top:50%;left:85%;width:4px;height:4px;"></div>
  <div class="particle" style="top:20%;left:45%;width:3px;height:3px;"></div>

  <!-- Background grid pattern -->
  <div class="login-bg-pattern"></div>

  <div class="login-page">
    <div class="login-container">

      <!-- ═══ Logo ═══ -->
      <div class="login-logo">
        <div class="login-logo-icon">✦</div>
        <div class="login-logo-name">大魔王</div>
        <div class="login-logo-subtitle">智能素材管理系统</div>
      </div>

      <!-- ═══ Login Card ═══ -->
      <div class="login-card">
        <h2 class="login-card-title">账号登录</h2>

        <!-- Username -->
        <div class="login-form-group">
          <label class="login-form-label">用户名</label>
          <div class="login-input-wrapper">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" class="form-input" placeholder="请输入用户名">
          </div>
        </div>

        <!-- Password -->
        <div class="login-form-group">
          <label class="login-form-label">密码</label>
          <div class="login-input-wrapper">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" class="form-input" placeholder="请输入密码">
          </div>
        </div>

        <!-- Remember / Forgot -->
        <div class="login-options">
          <label class="login-checkbox">
            <input type="checkbox">
            <span>记住我</span>
          </label>
          <a href="#" class="login-forgot">忘记密码?</a>
        </div>

        <!-- Login Button -->
        <button class="btn-primary login-btn">登 录</button>

        <!-- Divider -->
        <div class="login-divider">
          <span>首次使用</span>
        </div>

        <!-- Footer Hint -->
        <div class="login-footer-hint">
          首次使用请联系 <a href="#">管理员</a> 创建账号
        </div>
      </div>

      <!-- ═══ Copyright ═══ -->
      <div class="login-footer">
        <div class="login-copyright">© 2026 智能素材管理系统</div>
      </div>

    </div>
  </div>
</body>
</html>
