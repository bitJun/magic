<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户个人信息</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .content-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Profile card */
    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border-normal);
      border-radius: var(--radius-card);
      padding: 32px;
      display: flex;
      gap: 36px;
      align-items: flex-start;
      transition: border-color var(--transition-fast);
    }

    .profile-card:hover {
      border-color: var(--border-accent);
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.25);
      position: relative;
    }

    .profile-avatar::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(139, 92, 246, 0.3);
    }

    .profile-info-table {
      flex: 1;
    }

    .info-row {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-normal);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      width: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .info-value {
      font-size: 14px;
      color: var(--text-heading);
      font-weight: 500;
    }

    .info-value .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 6px;
      background: rgba(139, 92, 246, 0.12);
      color: var(--text-tag);
      font-size: 12px;
      font-weight: 600;
    }

    /* Stat cards */
    .my-data-section {
      background: var(--bg-card);
      border: 1px solid var(--border-normal);
      border-radius: var(--radius-card);
      padding: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title svg {
      width: 18px;
      height: 18px;
      color: var(--text-tag);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .mini-stat {
      padding: 18px 16px;
      border-radius: var(--radius-small);
      background: rgba(15, 15, 25, 0.5);
      border: 1px solid var(--border-normal);
      text-align: center;
      transition: all var(--transition-fast);
    }

    .mini-stat:hover {
      border-color: var(--border-accent);
    }

    .mini-stat .stat-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .mini-stat .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 4px;
    }

    .mini-stat .stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Change password */
    .password-card {
      background: var(--bg-card);
      border: 1px solid var(--border-normal);
      border-radius: var(--radius-card);
      padding: 24px;
    }

    .password-form {
      max-width: 420px;
    }

    .password-input-wrapper {
      position: relative;
    }

    .password-input-wrapper .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim-alt);
      cursor: pointer;
      transition: color var(--transition-fast);
    }

    .password-input-wrapper .toggle-pw:hover {
      color: var(--text-heading);
    }

    /* Logout section */
    .logout-section {
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-card);
      padding: 24px;
      background: rgba(239, 68, 68, 0.03);
    }

    .logout-section .section-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .btn-logout {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 24px;
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
      font-size: 13.5px;
      font-weight: 600;
      border-radius: var(--radius-button);
      border: 1px solid rgba(239, 68, 68, 0.2);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .btn-logout svg {
      width: 16px;
      height: 16px;
    }

    @media (max-width: 768px) {
      .profile-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .info-row {
        flex-direction: column;
        gap: 4px;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">素材管理系统</span>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">主菜单</div>
        <a class="nav-item" href="01-智能搜索.html"><span class="nav-icon">🔍</span> 智能搜索</a>
        <a class="nav-item" href="02-素材库管理.html"><span class="nav-icon">📁</span> 素材库</a>
        <a class="nav-item" href="03-项目管理.html"><span class="nav-icon">📋</span> 项目管理</a>
        <a class="nav-item" href="04-人脸识别库.html"><span class="nav-icon">👤</span> 人脸识别库</a>
        <a class="nav-item" href="05-数据分析.html"><span class="nav-icon">📊</span> 数据分析</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">系统</div>
        <a class="nav-item" href="15-设置页面.html"><span class="nav-icon">⚙️</span> 设置</a>
        <a class="nav-item" href="20-回收站.html"><span class="nav-icon">🗑️</span> 回收站</a>
      </div>
      <div class="sidebar-bottom">
        <a class="sidebar-user active" style="background:rgba(139,92,246,0.08);">
          <div class="avatar">张</div>
          <div>
            <div class="user-name">张三</div>
            <div class="user-role">管理员</div>
          </div>
        </a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">个人信息</h1>
          <p class="page-subtitle">管理你的账户信息和偏好设置</p>
        </div>
      </div>

      <div class="content-grid">

        <!-- Profile Card -->
        <div class="profile-card">
          <div class="profile-avatar">张</div>
          <div class="profile-info-table">
            <div class="info-row">
              <span class="info-label">姓名</span>
              <span class="info-value">张三</span>
            </div>
            <div class="info-row">
              <span class="info-label">角色</span>
              <span class="info-value"><span class="role-badge">👑 管理员</span></span>
            </div>
            <div class="info-row">
              <span class="info-label">邮箱</span>
              <span class="info-value">zhangsan@company.com</span>
            </div>
            <div class="info-row">
              <span class="info-label">部门</span>
              <span class="info-value">创意内容部</span>
            </div>
            <div class="info-row">
              <span class="info-label">加入时间</span>
              <span class="info-value">2025-03-15</span>
            </div>
            <div class="info-row">
              <span class="info-label">最后登录</span>
              <span class="info-value">2026-02-07 09:32</span>
            </div>
          </div>
        </div>

        <!-- My Data -->
        <div class="my-data-section">
          <h3 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
            我的数据
          </h3>
          <div class="stats-grid">
            <div class="mini-stat">
              <div class="stat-icon">📤</div>
              <div class="stat-num">156</div>
              <div class="stat-label">上传素材</div>
            </div>
            <div class="mini-stat">
              <div class="stat-icon">📥</div>
              <div class="stat-num">234</div>
              <div class="stat-label">下载次数</div>
            </div>
            <div class="mini-stat">
              <div class="stat-icon">🔍</div>
              <div class="stat-num">567</div>
              <div class="stat-label">搜索次数</div>
            </div>
            <div class="mini-stat">
              <div class="stat-icon">⭐</div>
              <div class="stat-num">45</div>
              <div class="stat-label">收藏素材</div>
            </div>
          </div>
        </div>

        <!-- Change Password -->
        <div class="password-card">
          <h3 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            修改密码
          </h3>
          <div class="password-form">
            <div class="form-group">
              <label class="form-label">当前密码</label>
              <div class="password-input-wrapper">
                <input type="password" class="form-input" placeholder="请输入当前密码" value="••••••••">
                <span class="toggle-pw">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">新密码</label>
              <div class="password-input-wrapper">
                <input type="password" class="form-input" placeholder="至少8位，含字母和数字">
                <span class="toggle-pw">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">确认新密码</label>
              <div class="password-input-wrapper">
                <input type="password" class="form-input" placeholder="再次输入新密码">
                <span class="toggle-pw">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
              </div>
            </div>
            <button class="btn-primary" style="margin-top:6px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              修改密码
            </button>
          </div>
        </div>

        <!-- Logout -->
        <div class="logout-section">
          <h3 class="section-title" style="color: #f87171;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" style="width:18px;height:18px;"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            账号安全
          </h3>
          <p class="section-desc">退出当前账号后需要重新登录才能使用系统。你的数据将被保留。</p>
          <a href="06-登录.html" class="btn-logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            退出登录
          </a>
        </div>

      </div>
    </main>
  </div>
</body>
</html>
