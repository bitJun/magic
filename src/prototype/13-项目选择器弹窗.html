<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目选择器弹窗</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-body);
      padding: 40px 20px;
    }

    .page-desc {
      max-width: 500px;
      text-align: center;
      margin-bottom: 32px;
    }

    .page-desc h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 10px;
    }

    .page-desc p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .page-desc .trigger-demo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 7px 16px;
      border-radius: var(--radius-small);
      background: var(--bg-card);
      border: 1px solid var(--border-normal);
      font-size: 13px;
      color: var(--text-body);
      cursor: pointer;
    }

    .page-desc .trigger-demo svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
    }

    /* Dropdown panel */
    .dropdown-panel {
      width: 300px;
      background: rgba(15, 15, 25, 0.98);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-card);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.1);
      overflow: hidden;
    }

    .dropdown-search {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-normal);
    }

    .dropdown-search input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      background: rgba(15, 15, 25, 0.6);
      border: 1px solid var(--border-normal);
      border-radius: var(--radius-small);
      color: var(--text-heading);
      font-size: 13px;
      transition: border-color var(--transition-fast);
    }

    .dropdown-search input:focus {
      border-color: var(--border-accent-strong);
    }

    .dropdown-search input::placeholder {
      color: var(--text-dim-alt);
    }

    .search-input-wrapper {
      position: relative;
    }

    .search-input-wrapper svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-dim-alt);
    }

    .dropdown-list {
      max-height: 320px;
      overflow-y: auto;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-body);
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .dropdown-item:hover {
      background: rgba(139, 92, 246, 0.06);
    }

    .dropdown-item.active {
      background: rgba(139, 92, 246, 0.1);
      color: var(--text-active);
    }

    .dropdown-item .check-icon {
      width: 16px;
      flex-shrink: 0;
      color: var(--purple);
      opacity: 0;
    }

    .dropdown-item.active .check-icon {
      opacity: 1;
    }

    .dropdown-item .project-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dropdown-item .project-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dropdown-item .project-count {
      font-size: 11px;
      color: var(--text-dim-alt);
      flex-shrink: 0;
    }

    .section-label {
      padding: 10px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dropdown-divider {
      height: 1px;
      background: var(--border-normal);
      margin: 4px 0;
    }

    .dropdown-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border-normal);
    }

    .dropdown-footer a {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-tag);
      cursor: pointer;
      transition: color var(--transition-fast);
    }

    .dropdown-footer a:hover {
      color: #c4b5fd;
    }
  </style>
</head>
<body>

  <div class="page-desc">
    <h1>项目选择器（下拉面板）</h1>
    <p>此组件为点击顶部 "项目: xxx ▼" 后展开的下拉选择面板，用于快速切换当前项目筛选。支持搜索、最近使用和完整项目列表。</p>
    <div class="trigger-demo">
      项目: 全部项目
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </div>

  <div class="dropdown-panel">
    <!-- Search -->
    <div class="dropdown-search">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="搜索项目…">
      </div>
    </div>

    <!-- List -->
    <div class="dropdown-list">
      <!-- All projects (selected) -->
      <div class="dropdown-item active">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-name">全部项目</span>
        <span class="project-count">(2,345)</span>
      </div>

      <div class="dropdown-divider"></div>

      <!-- Recent -->
      <div class="section-label">📌 最近使用</div>
      <div class="dropdown-item">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-dot" style="background: #8b5cf6;"></span>
        <span class="project-name">护肤品A系列</span>
        <span class="project-count">486</span>
      </div>
      <div class="dropdown-item">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-dot" style="background: #ec4899;"></span>
        <span class="project-name">口红系列</span>
        <span class="project-count">312</span>
      </div>

      <div class="dropdown-divider"></div>

      <!-- All projects list -->
      <div class="section-label">📁 所有项目</div>
      <div class="dropdown-item">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-dot" style="background: #3b82f6;"></span>
        <span class="project-name">眼影系列</span>
        <span class="project-count">258</span>
      </div>
      <div class="dropdown-item">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-dot" style="background: #10b981;"></span>
        <span class="project-name">面膜系列</span>
        <span class="project-count">189</span>
      </div>
      <div class="dropdown-item">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-dot" style="background: #f59e0b;"></span>
        <span class="project-name">粉底液系列</span>
        <span class="project-count">145</span>
      </div>
      <div class="dropdown-item">
        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="project-dot" style="background: #06b6d4;"></span>
        <span class="project-name">防晒系列</span>
        <span class="project-count">97</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="dropdown-footer">
      <a href="03-项目管理.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        ➕ 管理项目
      </a>
    </div>
  </div>

</body>
</html>
